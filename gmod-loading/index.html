<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка сервера GMod</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        /* Фоновое изображение (слайд) */
        #slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }
        /* Затемнение для читаемости текста */
        .overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            text-shadow: 0 0 30px #ff6600;
            letter-spacing: 4px;
            margin-bottom: 20px;
            animation: glowPulse 2s infinite alternate;
        }
        .sub {
            font-size: 1.8rem;
            opacity: 0.8;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes glowPulse {
            from { text-shadow: 0 0 20px #ff6600; }
            to { text-shadow: 0 0 50px #ff8800; }
        }
        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }
        /* Счётчик слайдов (опционально) */
        .counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
            color: #ccc;
            backdrop-filter: blur(4px);
        }
        /* Скрытый аудиоэлемент (без интерфейса) */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Слайд-шоу (картинка меняется через JS) -->
    <img id="slideshow" src="slide1.jpg" alt="Loading">

    <!-- Аудио с автозапуском и зацикливанием -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
        <!-- Если используете .ogg, добавьте ещё один source -->
    </audio>

    <!-- Контент поверх фона -->
    <div class="overlay">
        <h1>⚡ ЗАГРУЗКА...</h1>
        <div class="sub">Подключаемся к серверу</div>
    </div>

    <!-- Счётчик (для наглядности, можно убрать) -->
    <div class="counter" id="slideCounter">1 / 8</div>

    <script>
        (function() {
            // --- НАСТРОЙКИ ---
            const TOTAL_SLIDES = 8;                 // количество картинок
            const SLIDE_INTERVAL = 8000;            // интервал смены (мс) – 8 секунд
            const IMAGE_EXT = 'jpg';                // расширение (можно поменять на png)
            const IMAGE_BASE = 'slide';             // основа имени файла (slide1.jpg, slide2.jpg ...)

            // --- ЭЛЕМЕНТЫ ---
            const imgElement = document.getElementById('slideshow');
            const counterElement = document.getElementById('slideCounter');
            const audio = document.getElementById('bgMusic');

            let currentSlide = 0; // 0-индекс, т.е. 0 = slide1

            // --- ФУНКЦИЯ СМЕНЫ СЛАЙДА ---
            function nextSlide() {
                // Увеличиваем индекс, зацикливаем
                currentSlide = (currentSlide + 1) % TOTAL_SLIDES;
                const slideNumber = currentSlide + 1; // для имени файла: slide1, slide2 ...
                const imagePath = `${IMAGE_BASE}${slideNumber}.${IMAGE_EXT}`;
                // Меняем src с плавным переходом (через opacity – делаем через CSS transition)
                imgElement.style.opacity = 0;
                // После смены src делаем opacity обратно 1 (с задержкой на переход)
                setTimeout(() => {
                    imgElement.src = imagePath;
                    imgElement.style.opacity = 1;
                }, 200); // задержка, чтобы переход был заметен (200 мс)
                // Обновляем счётчик
                if (counterElement) {
                    counterElement.textContent = `${slideNumber} / ${TOTAL_SLIDES}`;
                }
            }

            // --- ЗАПУСК СЛАЙД-ШОУ ---
            // Устанавливаем первый слайд (уже в src стоит slide1.jpg, но можно перестраховаться)
            imgElement.src = `${IMAGE_BASE}1.${IMAGE_EXT}`;
            // Запускаем интервал
            setInterval(nextSlide, SLIDE_INTERVAL);

            // --- АВТОЗАПУСК МУЗЫКИ ---
            // Пытаемся запустить сразу после загрузки страницы
            function startMusic() {
                audio.play().then(() => {
                    console.log('Музыка играет');
                }).catch((err) => {
                    // Если автозапуск заблокирован – повесим обработчик на любое событие клика
                    console.log('Автозапуск заблокирован, ждём клика пользователя');
                    // Один раз при клике на документ запустим музыку
                    document.addEventListener('click', function playOnClick() {
                        audio.play().catch(() => {});
                        document.removeEventListener('click', playOnClick);
                    }, { once: true });
                });
            }

            // Запускаем, когда DOM полностью загружен
            if (document.readyState === 'complete') {
                startMusic();
            } else {
                window.addEventListener('load', startMusic);
            }

            // Также можно попробовать запустить при первом касании/клике в любом месте,
            // даже если уже запустилось – ничего страшного.
            // Для надёжности добавим ещё один обработчик на клик по всей странице
            // (но только если музыка ещё не играет)
            document.addEventListener('click', function() {
                if (audio.paused) {
                    audio.play().catch(() => {});
                }
            });

        })();
    </script>
</body>
</html>
